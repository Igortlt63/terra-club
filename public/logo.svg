<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#40D9F0"/>
      <stop offset="40%"  stop-color="#1AABCC"/>
      <stop offset="100%" stop-color="#0B7BAA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Круг-кольцо планеты -->
  <ellipse cx="60" cy="22" rx="20" ry="22"
    fill="none"
    stroke="url(#circleGrad)"
    stroke-width="2.8"
    filter="url(#glow)"
  />
  <!-- Текст TERRA -->
  <text x="60" y="58"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif"
    font-size="14"
    font-weight="700"
    letter-spacing="4"
    text-anchor="middle"
    fill="white"
  >TERRA</text>
</svg>
